<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Preview — Neural Network</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0F172A; font-family:'Inter',sans-serif; color:#F1F5F9; overflow-x:hidden; }
  canvas { position:fixed; inset:0; z-index:0; }
  .ui { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; }
  nav { display:flex; align-items:center; justify-content:space-between; padding:1.25rem 4rem; border-bottom:1px solid rgba(255,255,255,0.06); backdrop-filter:blur(12px); background:rgba(15,23,42,0.6); }
  .logo { font-size:1.05rem; font-weight:800; text-decoration:none; color:#F1F5F9; letter-spacing:-0.02em; }
  .logo span { color:#3B82F6; }
  .hero { flex:1; display:flex; align-items:center; padding:5rem 4rem 4rem; max-width:900px; }
  .badge { display:inline-flex; align-items:center; gap:.5rem; background:rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.3); color:#38BDF8; font-size:.7rem; font-weight:700; padding:.3rem .85rem; border-radius:100px; text-transform:uppercase; letter-spacing:.1em; margin-bottom:1.6rem; }
  .greeting { font-size:1.4rem; font-weight:400; color:#94A3B8; margin-bottom:.15rem; }
  h1 { font-size:clamp(3rem,6vw,4.75rem); font-weight:900; line-height:1; letter-spacing:-.04em; margin-bottom:1rem; }
  h1 span { color:#3B82F6; }
  .role { font-size:1.1rem; color:#94A3B8; margin-bottom:2.5rem; }
  .btns { display:flex; gap:1rem; }
  .btn { padding:.7rem 1.4rem; border-radius:8px; font-size:.875rem; font-weight:600; text-decoration:none; cursor:pointer; border:1px solid transparent; }
  .btn-p { background:#3B82F6; color:#fff; border-color:#3B82F6; }
  .btn-o { background:transparent; color:#F1F5F9; border-color:rgba(255,255,255,0.15); }
  .label { position:fixed; bottom:1.5rem; right:2rem; font-size:.75rem; color:rgba(255,255,255,0.25); z-index:10; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <nav><a class="logo" href="#">chris<span>knapp</span>.dev</a></nav>
  <div class="hero">
    <div>
      <div class="badge">Strategy · Analytics · AI</div>
      <p class="greeting">Hey, I'm</p>
      <h1>Chris <span>Knapp</span></h1>
      <p class="role">Strategy &amp; Analytics Leader at Progressive Insurance</p>
      <div class="btns">
        <a href="#" class="btn btn-p">Contact Me</a>
        <a href="#" class="btn btn-o">My Resume</a>
      </div>
    </div>
  </div>
</div>
<div class="label">PREVIEW: Neural Network</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); window.addEventListener('resize', () => { resize(); buildNet(); });

// ── BUILD NETWORK ──
const LAYERS = [5, 8, 8, 8, 5];
let nodes = [], edges = [];

function buildNet() {
  nodes = []; edges = [];
  const layerCount = LAYERS.length;
  const xPad = W * 0.12;
  const xStep = (W - xPad * 2) / (layerCount - 1);

  LAYERS.forEach((count, li) => {
    const x = xPad + li * xStep;
    const yStep = H / (count + 1);
    for (let ni = 0; ni < count; ni++) {
      nodes.push({ x, y: yStep * (ni + 1), layer: li, pulse: 0, glow: 0 });
    }
  });

  // connect adjacent layers
  for (let li = 0; li < layerCount - 1; li++) {
    const layerA = nodes.filter(n => n.layer === li);
    const layerB = nodes.filter(n => n.layer === li + 1);
    layerA.forEach(a => {
      layerB.forEach(b => {
        edges.push({ a, b, signals: [], active: Math.random() > 0.3 });
      });
    });
  }
}
buildNet();

// ── SIGNALS ──
class Signal {
  constructor(edge) {
    this.edge = edge;
    this.t = 0; // 0→1 progress
    this.speed = 0.004 + Math.random() * 0.004;
    this.size = 3 + Math.random() * 3;
    this.done = false;
  }
  update() {
    this.t += this.speed;
    if (this.t >= 1) {
      this.done = true;
      this.edge.b.pulse = 1.0;
    }
  }
  pos() {
    const { a, b } = this.edge;
    return { x: a.x + (b.x - a.x) * this.t, y: a.y + (b.y - a.y) * this.t };
  }
}

// fire signals periodically
setInterval(() => {
  const layer0 = nodes.filter(n => n.layer === 0);
  const starter = layer0[Math.floor(Math.random() * layer0.length)];
  starter.pulse = 1.0;
  // propagate: fire signals on all outgoing edges from this node
  edges.filter(e => e.a === starter && e.active).forEach(e => {
    e.signals.push(new Signal(e));
  });
}, 200);

// cascade: when a node gets pulsed, fire its outgoing edges
function propagate() {
  nodes.forEach(n => {
    if (n.pulse > 0.8 && n.layer < LAYERS.length - 1) {
      edges.filter(e => e.a === n && e.active && e.signals.length < 3).forEach(e => {
        if (Math.random() > 0.4) e.signals.push(new Signal(e));
      });
    }
  });
}

// ── DRAW ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  // edges
  edges.forEach(e => {
    const alpha = e.active ? 0.25 : 0.04;
    ctx.beginPath();
    ctx.moveTo(e.a.x, e.a.y);
    ctx.lineTo(e.b.x, e.b.y);
    ctx.strokeStyle = `rgba(59,130,246,${alpha})`;
    ctx.lineWidth = e.active ? 1 : 0.5;
    ctx.stroke();

    // update + draw signals
    e.signals = e.signals.filter(s => !s.done);
    e.signals.forEach(s => {
      s.update();
      const p = s.pos();
      // glowing trail
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, s.size * 4);
      grad.addColorStop(0, 'rgba(147,197,253,0.9)');
      grad.addColorStop(0.3, 'rgba(59,130,246,0.5)');
      grad.addColorStop(1, 'rgba(59,130,246,0)');
      ctx.beginPath(); ctx.arc(p.x, p.y, s.size * 4, 0, Math.PI * 2);
      ctx.fillStyle = grad; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, s.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,230,255,0.95)'; ctx.fill();
    });
  });

  // nodes
  nodes.forEach(n => {
    n.pulse = Math.max(0, n.pulse - 0.018);

    const r = 7 + n.pulse * 8;
    const glowR = r * 5;

    // outer glow
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowR);
    const gAlpha = 0.12 + n.pulse * 0.5;
    grad.addColorStop(0, `rgba(59,130,246,${gAlpha + 0.3})`);
    grad.addColorStop(0.4, `rgba(59,130,246,${gAlpha})`);
    grad.addColorStop(1, 'rgba(59,130,246,0)');
    ctx.beginPath(); ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();

    // node circle
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(30,58,138,${0.7 + n.pulse * 0.3})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(96,165,250,${0.6 + n.pulse * 0.4})`;
    ctx.lineWidth = 1.5 + n.pulse * 2;
    ctx.stroke();
  });

  propagate();
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
